# Mistral Vibe Configuration
# Equivalent to claude/settings.json

active_model = "mistral-medium-3.5"
vim_keybindings = true
theme = "flexoki"
disable_welcome_banner_animation = false
autocopy_to_clipboard = true
file_watcher_for_autocomplete = true
displayed_workdir = ""
context_warnings = false
voice_mode_enabled = true
narrator_enabled = false
active_transcribe_model = "voxtral-realtime"
active_tts_model = "voxtral-tts"
bypass_tool_permissions = false
enable_telemetry = true
system_prompt_id = "cli"
compaction_prompt_id = "compact"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_notifications = true
enable_system_trust_store = false
api_timeout = 720.0
auto_compact_threshold = 200000

# MCP servers are configured in ~/.vibe/mcp.json (single source of truth).

[project_context]
default_commit_count = 5
timeout_seconds = 2.0

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "session"
enabled = true

# Tool permissions - map Claude plugin permissions
[tools.skill]
permission = "always"

[tools.exit_plan_mode]
permission = "always"

[tools.task]
permission = "ask"
allowlist = ["explore"]

[tools.bash]
permission = "ask"
allowlist = [
    "cd",
    "echo",
    "git diff",
    "git log",
    "git status",
    "tree",
    "whoami",
    "cat",
    "file",
    "find",
    "head",
    "ls",
    "pwd",
    "stat",
    "tail",
    "uname",
    "wc",
    "which",
    "make",
    "mvn",
    "gradle",
    "npm",
    "yarn",
    "pnpm",
    "cargo",
    "go",
    "python",
    "python3",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
]

[tools.edit]
permission = "ask"

[tools.grep]
permission = "always"
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
]

[tools.ask_user_question]
permission = "always"

[tools.web_search]
permission = "ask"
timeout = 120

[tools.web_fetch]
permission = "ask"
default_timeout = 30
max_timeout = 120

[tools.todo]
permission = "always"
max_todos = 100

[tools.write_file]
permission = "ask"
max_write_bytes = 64000
create_parent_dirs = true

[tools.read]
permission = "always"
max_read_bytes = 51200
